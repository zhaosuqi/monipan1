<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时模拟盘监控</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }

        .header h1 {
            font-size: 24px;
            color: #4caf50;
        }

        .status {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
        }

        .status-indicator.connected {
            background: #4caf50;
        }

        #chart {
            flex: 1;
            border-radius: 8px;
            background: #2a2a2a;
        }

        .info-panel {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            height: 200px;
        }

        .info-card {
            flex: 1;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            overflow: hidden;
        }

        .info-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .logs-container {
            height: calc(100% - 30px);
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .klines-table-container {
            height: calc(100% - 30px);
            overflow-y: auto;
        }

        .klines-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .klines-table th {
            background: #1a1a1a;
            color: #888;
            padding: 8px;
            text-align: right;
            position: sticky;
            top: 0;
            font-weight: normal;
        }

        .klines-table th:first-child {
            text-align: left;
        }

        .klines-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #3a3a3a;
            text-align: right;
        }

        .klines-table td:first-child {
            text-align: left;
        }

        .klines-table tr:hover {
            background: #333;
        }

        .kline-up {
            color: #4caf50;
        }

        .kline-down {
            color: #f44336;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #3a3a3a;
        }

        .log-time {
            color: #888;
        }

        .log-level-info {
            color: #4caf50;
        }

        .log-level-warning {
            color: #ff9800;
        }

        .log-level-error {
            color: #f44336;
        }

        .latest-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .info-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
        }

        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: #4caf50;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <h1>📊 实时模拟盘监控</h1>
                <div class="status">
                    <div class="status-item">
                        <div class="status-indicator" id="statusIndicator"></div>
                        <span id="statusText">连接中...</span>
                    </div>
                    <div class="status-item">
                        <span>交易对: </span>
                        <strong id="symbolText">-</strong>
                    </div>
                    <div class="status-item">
                        <span>K线数: </span>
                        <strong id="klineCount">0</strong>
                    </div>
                    <div class="status-item">
                        <span>最新时间: </span>
                        <strong id="latestTime">-</strong>
                    </div>
                </div>
            </div>

            <div id="chart"></div>

            <div class="info-panel">
                <div class="info-card">
                    <h3>最新K线信息</h3>
                    <div class="latest-info">
                        <div class="info-item">
                            <div class="info-label">开盘价</div>
                            <div class="info-value" id="openPrice">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">最高价</div>
                            <div class="info-value" id="highPrice">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">最低价</div>
                            <div class="info-value" id="lowPrice">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">收盘价</div>
                            <div class="info-value" id="closePrice">-</div>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <h3>最近10条K线</h3>
                    <div class="klines-table-container">
                        <table class="klines-table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>开盘</th>
                                    <th>最高</th>
                                    <th>最低</th>
                                    <th>收盘</th>
                                    <th>涨跌</th>
                                </tr>
                            </thead>
                            <tbody id="klinesTableBody">
                                <tr>
                                    <td colspan="6" style="text-align: center; color: #888;">等待数据...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="info-card">
                    <h3>系统日志</h3>
                    <div class="logs-container" id="logsContainer">
                        <div class="log-entry">
                            <span class="log-time">等待连接...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 创建图表
        const chartElement = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartElement, {
            layout: {
                background: { type: 'solid', color: '#1a1a1a' },
                textColor: '#e0e0e0',
            },
            grid: {
                vertLines: { color: '#2a2a2a' },
                horzLines: { color: '#2a2a2a' },
            },
            width: chartElement.clientWidth,
            height: chartElement.clientHeight,
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#4caf50',
            downColor: '#f44336',
            borderVisible: false,
            wickUpColor: '#4caf50',
            wickDownColor: '#f44336',
        });

        // 响应式图表
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartElement.clientWidth });
        });

        // 存储最近10条K线数据
        let recentKlines = [];

        // WebSocket连接
        const socket = io();

        socket.on('connect', () => {
            console.log('已连接到服务器');
            // 请求初始数据
            socket.emit('request_initial_data');
        });

        socket.on('initial_klines', (data) => {
            console.log('收到历史K线:', data.klines.length, '条');

            // 转换K线数据
            const klineData = data.klines.map(k => ({
                time: new Date(k.time).getTime() / 1000,
                open: k.open,
                high: k.high,
                low: k.low,
                close: k.close
            }));

            // 设置数据
            candleSeries.setData(klineData);

            // 更新状态
            document.getElementById('klineCount').textContent = klineData.length;

            if (klineData.length > 0) {
                const latest = klineData[klineData.length - 1];
                updateLatestInfo(new Date(latest.time * 1000), latest);
            }

            // 更新最近10条K线表格
            recentKlines = data.klines.slice(-10);
            updateKlinesTable();
        });

        socket.on('new_kline', (kline) => {
            console.log('新K线:', kline);

            // 添加新K线
            candleSeries.update({
                time: new Date(kline.time).getTime() / 1000,
                open: kline.open,
                high: kline.high,
                low: kline.low,
                close: kline.close
            });

            // 更新信息
            updateLatestInfo(new Date(kline.time), kline);

            // 更新计数
            const currentCount = parseInt(document.getElementById('klineCount').textContent);
            document.getElementById('klineCount').textContent = currentCount + 1;

            // 更新最近10条K线表格
            recentKlines.push(kline);
            if (recentKlines.length > 10) {
                recentKlines.shift();
            }
            updateKlinesTable();
        });

        socket.on('status_update', (status) => {
            document.getElementById('statusIndicator').classList.add('connected');
            document.getElementById('statusText').textContent = '已连接';
            document.getElementById('symbolText').textContent = status.symbol;
        });

        socket.on('log_update', (log) => {
            addLog(log);
        });

        function updateLatestInfo(time, kline) {
            const timeStr = time.toLocaleString('zh-CN');
            document.getElementById('latestTime').textContent = timeStr;
            document.getElementById('openPrice').textContent = kline.open.toFixed(2);
            document.getElementById('highPrice').textContent = kline.high.toFixed(2);
            document.getElementById('lowPrice').textContent = kline.low.toFixed(2);
            document.getElementById('closePrice').textContent = kline.close.toFixed(2);
        }

        function addLog(log) {
            const container = document.getElementById('logsContainer');
            const levelClass = `log-level-${log.level.toLowerCase()}`;

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <span class="log-time">${log.time}</span>
                <span class="${levelClass}">[${log.level}]</span>
                <span>${log.message}</span>
            `;

            container.appendChild(logEntry);

            // 保持最新的50条日志
            while (container.children.length > 50) {
                container.removeChild(container.firstChild);
            }

            // 自动滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        function updateKlinesTable() {
            const tbody = document.getElementById('klinesTableBody');

            if (recentKlines.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #888;">等待数据...</td></tr>';
                return;
            }

            // 清空表格
            tbody.innerHTML = '';

            // 倒序显示，最新的在上面
            recentKlines.slice().reverse().forEach(kline => {
                const row = document.createElement('tr');

                // 计算涨跌
                const change = kline.close - kline.open;
                const changePercent = ((change / kline.open) * 100).toFixed(2);
                const changeStr = `${change >= 0 ? '+' : ''}${changePercent}%`;
                const changeClass = change >= 0 ? 'kline-up' : 'kline-down';

                // 格式化时间
                const time = new Date(kline.time);
                const timeStr = `${time.getHours().toString().padStart(2, '0')}:${time.getMinutes().toString().padStart(2, '0')}`;

                row.innerHTML = `
                    <td>${timeStr}</td>
                    <td>${kline.open.toFixed(2)}</td>
                    <td>${kline.high.toFixed(2)}</td>
                    <td>${kline.low.toFixed(2)}</td>
                    <td>${kline.close.toFixed(2)}</td>
                    <td class="${changeClass}">${changeStr}</td>
                `;

                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
