<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 交易监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f0b90b;
            background: rgba(0, 0, 0, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .code-group {
            display: flex;
            gap: 10px;
        }

        .code-group input {
            flex: 1;
        }

        .btn-send-code {
            padding: 12px 20px;
            background: linear-gradient(135deg, #f0b90b 0%, #f8d12f 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            min-width: 120px;
        }

        .btn-send-code:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(240, 185, 11, 0.4);
        }

        .btn-send-code:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
        }

        .btn-send-code.counting {
            background: linear-gradient(90deg, #f0b90b 0%, #f8d12f 50%, #f0b90b 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            color: #1a1a2e;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f0b90b 0%, #f8d12f 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(240, 185, 11, 0.4);
        }

        .btn-login:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: rgba(0, 200, 83, 0.2);
            color: #00c853;
            border: 1px solid rgba(0, 200, 83, 0.3);
        }

        .message.error {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .countdown {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            text-align: center;
        }

        .icon-lock {
            text-align: center;
            margin-bottom: 20px;
        }

        .icon-lock svg {
            width: 60px;
            height: 60px;
            fill: #f0b90b;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="icon-lock">
            <svg viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
        </div>

        <div class="login-header">
            <h1>交易监控系统</h1>
            <p>请登录以继续访问</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入手机号" maxlength="11" value="">
            </div>

            <div class="form-group">
                <label for="code">验证码</label>
                <div class="code-group">
                    <input type="text" id="code" name="code" placeholder="请输入6位验证码" maxlength="6" autocomplete="off">
                    <button type="button" class="btn-send-code" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">登 录</button>

            <div class="countdown" id="countdown"></div>
        </form>

        <div class="message" id="message"></div>
    </div>

    <script>
        let countdownTimer = null;
        let remainingTime = 0;

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
            msgEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    msgEl.style.display = 'none';
                }, 3000);
            }
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (mins > 0) {
                return `${mins}分${secs.toString().padStart(2, '0')}秒`;
            }
            return `${secs}秒`;
        }

        function startCountdown(seconds) {
            remainingTime = seconds;
            const btn = document.getElementById('sendCodeBtn');
            const countdownEl = document.getElementById('countdown');

            btn.disabled = true;
            btn.classList.add('counting');

            countdownTimer = setInterval(() => {
                remainingTime--;
                btn.textContent = `${formatTime(remainingTime)}后可重试`;
                countdownEl.textContent = `验证码有效期2分钟，${formatTime(remainingTime)}后可重新获取`;

                if (remainingTime <= 0) {
                    clearInterval(countdownTimer);
                    btn.disabled = false;
                    btn.classList.remove('counting');
                    btn.textContent = '获取验证码';
                    countdownEl.textContent = '';
                }
            }, 1000);
        }

        async function sendCode() {
            const phone = document.getElementById('phone').value.trim();

            if (!phone || phone.length !== 11) {
                showMessage('请输入正确的手机号', 'error');
                return;
            }

            hideMessage();
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';

            try {
                const response = await fetch('/api/send_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    startCountdown(180); // 3分钟（180秒）后才能重新获取
                } else {
                    showMessage(data.error || '发送失败', 'error');
                    // 如果有 retry_after，显示倒计时，不重置按钮
                    if (data.retry_after) {
                        startCountdown(data.retry_after);
                    } else {
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    }
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('code').value.trim();

            if (!phone || phone.length !== 11) {
                showMessage('请输入正确的手机号', 'error');
                return;
            }

            if (!code || code.length !== 6) {
                showMessage('请输入6位验证码', 'error');
                return;
            }

            hideMessage();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone, code })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage(data.error || '登录失败', 'error');
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });

        // 回车键发送验证码
        document.getElementById('code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
