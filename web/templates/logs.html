<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志查看 - 交易监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --border-color: rgba(255,255,255,0.1);
            --accent-color: #f0b90b;
            --success-color: #00c853;
            --danger-color: #ff5252;
            --info-color: #00b0ff;
            --warning-color: #ff9100;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-card) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .navbar {
            background: rgba(0,0,0,0.3) !important;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand {
            color: var(--accent-color) !important;
            font-weight: 600;
        }

        .nav-link {
            color: var(--text-secondary) !important;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary) !important;
        }

        .container-main {
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .log-container {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 80vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log-line {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-line:hover {
            background: rgba(255,255,255,0.05);
        }

        .log-timestamp {
            color: var(--text-secondary);
        }

        .log-level-INFO { color: var(--success-color); }
        .log-level-ERROR { color: var(--danger-color); }
        .log-level-WARNING { color: var(--warning-color); }
        .log-level-DEBUG { color: var(--info-color); }

        .log-line:has(.log-level-ERROR) {
            background: rgba(255,82,82,0.1);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .btn-refresh {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            background: #f8d12f;
        }

        .btn-refresh:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auto-refresh-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-left: 15px;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .status-success {
            background: rgba(0,200,83,0.2);
            color: var(--success-color);
        }

        .status-error {
            background: rgba(255,82,82,0.2);
            color: var(--danger-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* 滚动条样式 */
        .log-container::-webkit-scrollbar {
            width: 8px;
        }

        .log-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up-arrow"></i> 交易监控系统
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">K线图表</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/params">交易参数</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/logs">日志查看</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-secondary me-3">
                        <i class="bi bi-person-circle"></i> {{ session.get('phone', '未知')[:3] }}****{{ session.get('phone', '未知')[-4:] }}
                    </span>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-box-arrow-right"></i> 退出
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-main">
        <div class="toolbar">
            <div>
                <button class="btn-refresh" id="refreshBtn" onclick="loadLogs()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
                <label class="auto-refresh-label">
                    <input type="checkbox" id="autoRefresh" checked> 自动刷新 (10秒)
                </label>
            </div>
            <div>
                <span class="status-badge" id="statusBadge">加载中...</span>
                <span class="text-secondary ms-3">
                    <i class="bi bi-file-text"></i> <span id="logPath">{{ log_path }}</span>
                </span>
            </div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="empty-state">
                <i class="bi bi-hourglass-split" style="font-size: 2rem;"></i>
                <p class="mt-2">加载日志中...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let autoRefreshTimer = null;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatLogLine(line) {
            // 匹配时间戳和日志级别
            const match = line.match(/^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}(?:\.\d+)?)\s+-\s+(\w+)\s+-\s+(.+)$/);
            if (match) {
                const [, timestamp, level, message] = match;
                const levelClass = `log-level-${level}`;
                return `<div class="log-line">
                    <span class="log-timestamp">${escapeHtml(timestamp)}</span> -
                    <span class="${levelClass}">${escapeHtml(level)}</span> -
                    ${escapeHtml(message)}
                </div>`;
            }
            // 普通行
            return `<div class="log-line">${escapeHtml(line)}</div>`;
        }

        async function loadLogs() {
            const btn = document.getElementById('refreshBtn');
            const container = document.getElementById('logContainer');
            const badge = document.getElementById('statusBadge');

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> 加载中...';

            try {
                const response = await fetch('/api/logs');
                const data = await response.json();

                if (data.success) {
                    if (data.lines.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                                <p class="mt-2">日志文件为空或不存在</p>
                            </div>
                        `;
                    } else {
                        const html = data.lines.map(formatLogLine).join('');
                        container.innerHTML = html;
                        // 滚动到底部
                        container.scrollTop = container.scrollHeight;
                    }
                    badge.className = 'status-badge status-success';
                    badge.textContent = `已加载 ${data.lines.length} 条日志`;
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-triangle" style="font-size: 2rem; color: var(--danger-color);"></i>
                        <p class="mt-2">加载失败: ${escapeHtml(error.message)}</p>
                    </div>
                `;
                badge.className = 'status-badge status-error';
                badge.textContent = '加载失败';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> 刷新';
            }
        }

        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            if (checkbox.checked) {
                autoRefreshTimer = setInterval(loadLogs, 10000);
            } else {
                clearInterval(autoRefreshTimer);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            toggleAutoRefresh();

            document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);
        });
    </script>
</body>
</html>
