<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交易参数 - 交易监控系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --bg-dark: #0b0e11;
      --bg-card: #141821;
      --bg-elev: #1e2329;
      --text-primary: #eaecef;
      --text-secondary: #848e9c;
      --border-color: #2b3139;
      --accent-color: #22d3ee;
      --accent-alt: #f97316;
      --success-color: #0ecb81;
      --danger-color: #f6465d;
      --warning-color: #f59e0b;
    }

    body {
      min-height: 100vh;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.08), transparent 40%),
        radial-gradient(circle at 90% 0%, rgba(249, 115, 22, 0.08), transparent 35%),
        linear-gradient(135deg, var(--bg-dark) 0%, #11151d 45%, #0a0c10 100%);
    }

    .navbar {
      background: rgba(11, 14, 17, 0.86) !important;
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(6px);
    }

    .navbar-brand {
      color: var(--accent-color) !important;
      font-weight: 600;
    }

    .nav-link {
      color: var(--text-secondary) !important;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text-primary) !important;
    }

    .navbar-toggler {
      border-color: var(--border-color);
    }

    .navbar-toggler-icon {
      filter: invert(1) grayscale(1);
    }

    .container-main {
      max-width: 1600px;
      padding: 20px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .page-subtitle {
      margin: 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .card {
      background: rgba(20, 24, 33, 0.88);
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
    }

    .card-header {
      color: var(--text-primary);
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.08), rgba(249, 115, 22, 0.04));
      border-bottom: 1px solid var(--border-color);
    }

    .card-body {
      background: transparent;
    }

    .form-label {
      color: var(--text-secondary);
    }

    .form-control {
      color: var(--text-primary);
      border-color: var(--border-color);
      background: rgba(17, 21, 29, 0.92);
    }

    .form-control:focus {
      color: var(--text-primary);
      border-color: var(--accent-color);
      box-shadow: 0 0 0 0.2rem rgba(34, 211, 238, 0.15);
      background: rgba(17, 21, 29, 1);
    }

    .readonly-note {
      font-size: 12px;
      color: #a5b4c8;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.24);
      border-radius: 8px;
      padding: 6px 10px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .user-info {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .logout-btn {
      margin-left: 10px;
      color: var(--danger-color);
      text-decoration: none;
      font-size: 0.875rem;
    }

    .logout-btn:hover {
      color: #ff7f94;
    }

    .readonly-page .form-control[readonly],
    .readonly-page textarea[readonly] {
      background-color: rgba(15, 19, 26, 0.95);
      color: #d7dde6;
      border-color: #323a48;
      cursor: not-allowed;
    }

    .readonly-page .form-check-input:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .readonly-page .text-success {
      color: var(--success-color) !important;
    }

    .readonly-page .text-danger {
      color: var(--danger-color) !important;
    }
  </style>
</head>
<body class="readonly-page">
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <i class="bi bi-graph-up-arrow"></i> 交易监控系统
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="topNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">K线图表</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/params">交易参数</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/logs">日志查看</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="user-info">
            <i class="bi bi-person-circle"></i> {{ session.get('phone', '未知')[:3] }}****{{ session.get('phone', '未知')[-4:] }}
          </span>
          <a href="/logout" class="logout-btn">
            <i class="bi bi-box-arrow-right"></i> 退出
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-main">
    <div class="page-header">
      <h1 class="h4 mb-1">交易参数查看</h1>
      <p class="page-subtitle">黑色主题参数面板，参数为只读展示。</p>
    </div>

    <div class="container-fluid px-0">
    <div id="form-wrapper" style="position:relative">
    <form id="backtest-form" method="post">
        <div class="row g-2 mb-2">
          <div class="col-md-3">
            <label class="form-label small mb-0">产品名称</label>
            <input name="symbol" class="form-control form-control-sm" value="{{ defaults.symbol }}" />
          </div>
        </div>

        <div class="row g-2 mb-2">
          <div class="col-md-3">
            <label class="form-label small mb-0">开仓执行</label>
            <div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="open_taker_or_maker" id="open_taker" value="TAKER" {% if defaults.open_taker_or_maker|upper == 'TAKER' %}checked{% endif %}>
                <label class="form-check-label" for="open_taker">TAKER</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="open_taker_or_maker" id="open_maker" value="MAKER" {% if defaults.open_taker_or_maker|upper != 'TAKER' %}checked{% endif %}>
                <label class="form-check-label" for="open_maker">MAKER</label>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <label class="form-label small mb-0">挂单比例 (Maker)</label>
            <input name="open_maker_price_ratio" class="form-control form-control-sm" value="{{ defaults.open_maker_price_ratio }}" />
          </div>
          <div class="col-md-3">
            <label class="form-label small mb-0">挂单持续时间(分)</label>
            <input name="open_maker_duration_minutes" class="form-control form-control-sm" value="{{ defaults.open_maker_duration_minutes }}" />
          </div>
        </div>

        <div class="card mb-2">
          <div class="card-header py-1 small" data-bs-toggle="collapse" data-bs-target="#stopLossDecayBody" style="cursor:pointer">
            止损与动能衰减 <span class="float-end">▼</span>
          </div>
          <div id="stopLossDecayBody" class="collapse">
            <div class="card-body py-2">
             <div class="row g-2">
                <div class="col-md-2">
                    <label class="form-label small mb-0">止损点数</label>
                    <input name="stop_loss_points" class="form-control form-control-sm" value="{{ defaults.stop_loss_points }}" />
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-0">止损后冷静期（分）</label>
                    <input name="stop_loss_hold_time" class="form-control form-control-sm" value="{{ defaults.stop_loss_hold_time }}" />
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-0 text-danger">超时平仓(分)</label>
                    <input name="close_time_minutes" class="form-control form-control-sm" value="{{ defaults.close_time_minutes }}" />
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-0 text-danger">超时平仓比例</label>
                    <input name="timeout_close_ratio" class="form-control form-control-sm" value="{{ defaults.timeout_close_ratio }}" />
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-0">衰减:当前HIST4h与开仓差</label>
                    <input name="close_decay_points" class="form-control form-control-sm" value="{{ defaults.close_decay_points }}" />
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-0">衰减:HIST4h绝对值小于</label>
                    <input name="hist4_neutral_band" class="form-control form-control-sm" value="{{ defaults.hist4_neutral_band }}" />
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-0 text-danger">衰减:dif4 t0与开仓差</label>
                    <input name="dif4_t0_min_change" class="form-control form-control-sm" value="{{ defaults.dif4_t0_min_change }}" />
                </div>
             </div>
            </div>
          </div>
        </div>  

        <div class="card mb-2">
          <div class="card-header py-1 small" data-bs-toggle="collapse" data-bs-target="#takeProfitBody" style="cursor:pointer">止盈参数 <span class="float-end">▼</span></div>
          <div id="takeProfitBody" class="collapse show">
          <div class="card-body py-2">
            <div class="row g-2">
              <div class="col-md-5">
                <label class="form-label small mb-0">分级止盈 (JSON 数组,开仓价*比例)</label>
                <input name="tp_levels" class="form-control form-control-sm" value='{{ defaults.tp_levels }}' />
              </div>
              <div class="col-md-4">
                <label class="form-label small mb-0">每次分级仓位比例</label>
                <input name="tp_ratio_per_level" class="form-control form-control-sm" value="{{ defaults.tp_ratio_per_level }}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0">最后成交止盈回撤，开仓价+开仓价*比例</label>
                <input name="drawdown_points" class="form-control form-control-sm" value="{{ defaults.drawdown_points }}" />
              </div>
            </div>
          </div>
          </div>
        </div>  

  
        <div class="card mb-2">
          <div class="card-header py-1 small" data-bs-toggle="collapse" data-bs-target="#momentumBody" style="cursor:pointer">动能大小判断 <span class="float-end">▼</span></div>
          <div id="momentumBody" class="collapse show">
          <div class="card-body py-2">
            <div class="row g-2 mb-2">
             
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST4H < </label>
                <input name="t0_hist4_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist4_limit}}" />
              </div>
               <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST4H > </label>
                <input name="t0_hist4_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist4_limit_min}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF4H < </label>
                <input name="t0_dif4_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif4_limit}}" />
              </div>
               <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF4H > </label>
                <input name="t0_dif4_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif4_limit_min}}" />
              </div>

              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST15 < </label>
                <input name="t0_hist15_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist15_limit}}" />
              </div>
               <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST15 > </label>
                <input name="t0_hist15_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist15_limit_min}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF15 < </label>
                <input name="t0_dif15_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif15_limit}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF15 > </label>
                <input name="t0_dif15_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif15_limit_min}}" />
              </div>

              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST1H < </label>
                <input name="t0_hist1h_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist1h_limit}}" />
              </div>
               <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST1H > </label>
                <input name="t0_hist1h_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist1h_limit_min}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF1H < </label>
                <input name="t0_dif1h_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif1h_limit}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF1H > </label>
                <input name="t0_dif1h_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif1h_limit_min}}" />
              </div>

              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST1d < </label>
                <input name="t0_hist1d_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist1d_limit}}" />
              </div>
               <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头HIST1d > </label>
                <input name="t0_hist1d_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_hist1d_limit_min}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF1d < </label>
                <input name="t0_dif1d_limit" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif1d_limit}}" />
              </div>
              <div class="col-md-3">
                <label class="form-label small mb-0 text-success">  多头DIF1d > </label>
                <input name="t0_dif1d_limit_min" class="form-control form-control-sm border-success" value="{{ defaults.t0_dif1d_limit_min}}" />
              </div>

               <!-- <div class="col-md-4">
                <label class="form-label small mb-0 text-danger">T1: DIF4限制 (多>)</label>
                <input name="t1_dif4_limit" class="form-control form-control-sm" value="{{ defaults.t1_dif4_limit }}" />
              </div> -->
            </div>
          </div>
          </div>
        </div>

        <div class="card mb-2">
          <div class="card-header py-1 small" data-bs-toggle="collapse" data-bs-target="#meanCheckBody" style="cursor:pointer">与前向平均值判断 <span class="float-end">▼</span></div>
          <div id="meanCheckBody" class="collapse show">
          <div class="card-body py-2">
            <div class="row g-2 mb-2">
              <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">A 判断DIF15向前查找分钟数(设置为0不生效)</label>
                  <input name="means_dif15_count" class="form-control form-control-sm border-success" value="{{ defaults.means_dif15_count }}" />
                  <input name="means_dif15_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_dif15_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">DIF15 - () > A平均值</label>
                  <input name="dif15_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.dif15_means_limit }}" />
                  <input name="dif15_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.dif15_means_limit_2 }}" />
                </div>

              <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">B 判断DEA15向前查找分钟数(设置为0不生效)</label>
                  <input name="means_dea15_count" class="form-control form-control-sm border-success" value="{{ defaults.means_dea15_count }}" />
                  <input name="means_dea15_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_dea15_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">DEA15 - () > 前A分钟DEA15</label>
                  <input name="dea15_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.dea15_means_limit }}" />
                  <input name="dea15_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.dea15_means_limit_2 }}" />  
                </div>
              <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">C 判断HIST15向前查找分钟数(设置为0不生效)</label>
                  <input name="means_hist15_count" class="form-control form-control-sm border-success" value="{{ defaults.means_hist15_count }}" />
                  <input name="means_hist15_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_hist15_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">HIST15 - () > C平均值</label>
                  <input name="hist15_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.hist15_means_limit }}" />
                  <input name="hist15_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.hist15_means_limit_2 }}" />
                </div>
              <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">D 判断HIST4向前查找分钟数(设置为0不生效)</label>
                  <input name="means_hist4_count" class="form-control form-control-sm border-success" value="{{ defaults.means_hist4_count }}" />
                  <input name="means_hist4_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_hist4_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">HIST4 - () >D平均值</label>
                  <input name="hist4_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.hist4_means_limit }}" />
                  <input name="hist4_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.hist4_means_limit_2 }}" /> 
                </div>
              <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">E 判断DIF4向前查找分钟数(设置为0不生效)</label>
                  <input name="means_dif4_count" class="form-control form-control-sm border-success" value="{{ defaults.means_dif4_count }}" />
                  <input name="means_dif4_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_dif4_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">DIF4 - ()>E平均值</label>
                  <input name="dif4_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.dif4_means_limit }}" />
                  <input name="dif4_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.dif4_means_limit_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">F 判断DEA4向前查找分钟数(设置为0不生效)</label>
                  <input name="means_dea4_count" class="form-control form-control-sm border-success" value="{{ defaults.means_dea4_count }}" />
                  <input name="means_dea4_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_dea4_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">DEA4 - ()>前F平均值</label>
                  <input name="dea4_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.dea4_means_limit }}" />
                  <input name="dea4_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.dea4_means_limit_2 }}" />
                </div> 
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">G 判断HIST1H向前查找分钟数(设置为0不生效)</label>
                  <input name="means_hist1h_count" class="form-control form-control-sm border-success" value="{{ defaults.means_hist1h_count }}" />
                  <input name="means_hist1h_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_hist1h_count_2 }}" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">HIST1H - () >G平均值</label>
                  <input name="hist1h_means_limit" class="form-control form-control-sm border-success" value="{{ defaults.hist1h_means_limit }}" />
                  <input name="hist1h_means_limit_2" class="form-control form-control-sm border-success" value="{{ defaults.hist1h_means_limit_2 }}" />
                </div>
              <div class="col-md-6">
                  <label class="form-label small mb-0 text-success">H 判断DIF1H向前查找分钟数(设置为0不生效)</label>
                  <input name="means_dif1h_count" class="form-control form-control-sm border-success" value="{{ defaults.means_dif1h_count }}" />
                  <input name="means_dif1h_count_2" class="form-control form-control-sm border-success" value="{{ defaults.means_dif1h_count_2 }}" />
                </div>

  <script>
    (function () {
      const form = document.getElementById('backtest-form');
      if (form) {
        form.addEventListener('submit', (event) => {
          event.preventDefault();
        });
      }

      document.querySelectorAll('input, textarea, select').forEach((el) => {
        const tag = (el.tagName || '').toLowerCase();
        const type = (el.type || '').toLowerCase();
        if (type === 'radio' || type === 'checkbox' || tag === 'select') {
          el.disabled = true;
        } else {
          el.readOnly = true;
        }
      });

      document.querySelectorAll('button').forEach((btn) => {
        btn.disabled = true;
      });

      const readonlyHint = document.createElement('div');
      readonlyHint.className = 'readonly-note mt-2';
      readonlyHint.textContent = '当前页面为参数查看模式，所有参数均为只读。';
      const container = document.querySelector('.container-main');
      if (container) {
        container.insertAdjacentElement('afterbegin', readonlyHint);
      }
    })();
  </script>
