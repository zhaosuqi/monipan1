<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易参数 - BTCUSD_PERP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0b0e11;
            color: #eaecef;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #181a20;
            border-bottom: 1px solid #2b3139;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #f0b90b;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 16px;
            color: #848e9c;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #eaecef;
            background: #2b3139;
        }

        .nav-link.active {
            color: #f0b90b;
            background: rgba(240, 185, 11, 0.1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: #f0b90b;
            color: #181a20;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #f8d56b;
        }

        .refresh-btn:disabled {
            background: #2b3139;
            color: #848e9c;
            cursor: not-allowed;
        }

        .last-update {
            font-size: 12px;
            color: #848e9c;
        }

        .main-content {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #eaecef;
        }

        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .param-card {
            background: #181a20;
            border: 1px solid #2b3139;
            border-radius: 8px;
            overflow: hidden;
        }

        .param-card-header {
            padding: 16px;
            background: #1e2329;
            border-bottom: 1px solid #2b3139;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .param-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0b90b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .param-card-icon {
            width: 20px;
            height: 20px;
            color: #f0b90b;
        }

        .param-list {
            padding: 12px;
        }

        .param-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #2b3139;
            transition: background 0.2s;
        }

        .param-item:last-child {
            border-bottom: none;
        }

        .param-item:hover {
            background: #1e2329;
            border-radius: 4px;
        }

        .param-name {
            font-size: 13px;
            color: #848e9c;
        }

        .param-value {
            font-size: 13px;
            font-weight: 500;
            color: #eaecef;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .param-value.boolean-true {
            color: #0ecb81;
        }

        .param-value.boolean-false {
            color: #f6465d;
        }

        .param-value.number {
            color: #f0b90b;
        }

        .param-value.string {
            color: #2ebd85;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2b3139;
            border-top-color: #f0b90b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            padding: 24px;
            text-align: center;
            color: #f6465d;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 3px;
            font-weight: 600;
        }

        .badge-enabled {
            background: rgba(14, 203, 129, 0.15);
            color: #0ecb81;
        }

        .badge-disabled {
            background: rgba(246, 70, 93, 0.15);
            color: #f6465d;
        }

        @media (max-width: 768px) {
            .params-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-wrap: wrap;
                gap: 12px;
            }

            .main-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">BTCUSD_PERP</a>
            <nav class="nav-links">
                <a href="/" class="nav-link">K线图</a>
                <a href="/params" class="nav-link active">交易参数</a>
            </nav>
        </div>
        <div class="header-right">
            <span class="last-update" id="lastUpdate">加载中...</span>
            <button class="refresh-btn" id="refreshBtn" onclick="loadParams()">刷新</button>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">交易参数配置</h1>
        <div class="params-grid" id="paramsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <script>
        // 格式化参数值
        function formatValue(value) {
            if (typeof value === 'boolean') {
                return {
                    text: value ? '启用' : '禁用',
                    class: value ? 'boolean-true' : 'boolean-false'
                };
            }

            if (typeof value === 'number') {
                // 如果是整数直接显示
                if (Number.isInteger(value)) {
                    return { text: value.toString(), class: 'number' };
                }
                // 小数保留合适位数
                return { text: value.toFixed(6).replace(/\.?0+$/, ''), class: 'number' };
            }

            if (Array.isArray(value)) {
                return { text: JSON.stringify(value), class: 'string' };
            }

            return { text: String(value), class: 'string' };
        }

        // 渲染参数卡片
        function renderParamCard(category, params) {
            const items = Object.entries(params).map(([name, value]) => {
                const formatted = formatValue(value);
                return `
                    <div class="param-item">
                        <span class="param-name">${name}</span>
                        <span class="param-value ${formatted.class}">${formatted.text}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="param-card">
                    <div class="param-card-header">
                        <svg class="param-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.24 4.24l-4.24-4.24M6.34 6.34L2.1 2.1"/>
                        </svg>
                        <span class="param-card-title">${category}</span>
                    </div>
                    <div class="param-list">
                        ${items}
                    </div>
                </div>
            `;
        }

        // 加载参数
        async function loadParams() {
            const refreshBtn = document.getElementById('refreshBtn');
            const paramsGrid = document.getElementById('paramsGrid');
            const lastUpdate = document.getElementById('lastUpdate');

            refreshBtn.disabled = true;
            refreshBtn.textContent = '加载中...';

            try {
                const response = await fetch('/api/config');
                const result = await response.json();

                if (result.success) {
                    const cards = Object.entries(result.data).map(([category, params]) => {
                        return renderParamCard(category, params);
                    }).join('');

                    paramsGrid.innerHTML = cards;
                    lastUpdate.textContent = '更新于: ' + new Date().toLocaleString('zh-CN');
                } else {
                    paramsGrid.innerHTML = `<div class="error-message">加载失败: ${result.error || '未知错误'}</div>`;
                }
            } catch (error) {
                paramsGrid.innerHTML = `<div class="error-message">加载失败: ${error.message}</div>`;
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '刷新';
            }
        }

        // 页面加载时自动加载
        document.addEventListener('DOMContentLoaded', loadParams);

        // 每30秒自动刷新
        setInterval(loadParams, 30000);
    </script>
</body>
</html>
