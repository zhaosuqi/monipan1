<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MoniPan监控系统{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }

        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #343a40;
            color: white;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            padding: 0.75rem 1rem;
            margin: 0.25rem 0;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .main-content {
            padding: 2rem;
        }

        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
        }

        .card-header {
            background-color: #fff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.125);
            font-weight: 600;
        }

        .status-badge {
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .status-running {
            background-color: #d4edda;
            color: #155724;
        }

        .status-stopped {
            background-color: #f8d7da;
            color: #721c24;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 1rem;
        }

        .param-item {
            padding: 0.75rem;
            border-bottom: 1px solid #dee2e6;
        }

        .param-item:last-child {
            border-bottom: none;
        }

        .param-key {
            font-weight: 600;
            color: #495057;
        }

        .param-value {
            color: #6c757d;
            font-family: monospace;
        }

        .mode-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .mode-card.selected {
            border: 2px solid #0d6efd;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .alert-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up-arrow"></i> MoniPan监控系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/config">
                            <i class="bi bi-gear"></i> 配置
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/monitor">
                            <i class="bi bi-activity"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/parameters">
                            <i class="bi bi-sliders"></i> 参数
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/config">
                                <i class="bi bi-gear-fill"></i> 配置管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/monitor">
                                <i class="bi bi-activity"></i> 运行监控
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/parameters">
                                <i class="bi bi-sliders"></i> 参数维护
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <hr style="border-color: rgba(255,255,255,0.1);">
                        </li>
                        <li class="nav-item">
                            <div class="text-white-50 small px-3">系统状态</div>
                        </li>
                        <li class="nav-item">
                            <div class="px-3">
                                <span id="sidebar-status" class="badge bg-secondary">未知</span>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 ms-sm-auto main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Toast容器 -->
    <div id="toast-container" class="alert-toast"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 公共脚本 -->
    <script>
        // 显示Toast消息
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast show align-items-center text-white bg-${type} border-0`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        // 更新侧边栏状态
        function updateSidebarStatus(running) {
            const statusBadge = document.getElementById('sidebar-status');
            if (running) {
                statusBadge.className = 'badge bg-success';
                statusBadge.textContent = '运行中';
            } else {
                statusBadge.className = 'badge bg-danger';
                statusBadge.textContent = '已停止';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 获取机器人状态
            fetch('/api/bot/state')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        updateSidebarStatus(data.data.running);
                    }
                })
                .catch(err => console.error('获取状态失败:', err));
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
